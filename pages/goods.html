<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товары - Семестровая работа</title>
    <link rel="stylesheet" href="../style/styles.css">
</head>
<body>
    <div class="page-container">
        <!-- Семантический тег header -->
        <header class="header">
            <h1>Товары</h1>
        </header>

        <!-- Семантический тег nav -->
        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item"><a class="nav-link" href="../index.html">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="news.html">Новости</a></li>
                <li class="nav-item"><a class="nav-link" href="practices.html">Практики</a></li>
                <li class="nav-item"><a class="nav-link" href="goods.html">Товары</a></li>
                <li class="nav-item"><a class="nav-link" href="contacts.html">Контакты</a></li>
            </ul>
        </nav>

        <!-- Семантический тег main для основного содержимого -->
        <main class="content">
            <section class="products-section">
                <h1 class="section-title">Наши товары</h1>
                <p class="section-subtitle">Мы предлагаем широкий ассортимент качественных товаров по доступным ценам</p>
                
                <!-- Используем CSS Grid для сетки товаров -->
                <div class="products-grid">
                    <!-- Семантический тег article для каждого товара -->
                    <article class="product-card">
                        <img src="../images/goods1.png" alt="Arcane" class="product-image">
                        <div class="product-content">
                            <h3 class="product-name">Drow Ranger</h3>
                            <p class="product-desc">Arcane Drow Ranger</p>
                            <div class="product-footer">
                                <p class="product-price">3214 ₽</p>
                                <button class="product-button">В корзину</button>
                            </div>
                        </div>
                    </article>
                    
                    <article class="product-card">
                        <img src="../images/goods2.png" alt="Arcane" class="product-image">
                        <div class="product-content">
                            <h3 class="product-name">Phantom Assasin</h3>
                            <p class="product-desc">Arcane Phantom Assasin</p>
                            <div class="product-footer">
                                <p class="product-price">2133 ₽</p>
                                <button class="product-button">В корзину</button>
                            </div>
                        </div>
                    </article>
                    
                    <article class="product-card">
                        <img src="../images/goods3.png" alt="Arcane" class="product-image">
                        <div class="product-content">
                            <h3 class="product-name">Lina</h3>
                            <p class="product-desc">Arcane Lina</p>
                            <div class="product-footer">
                                <p class="product-price">2567 ₽</p>
                                <button class="product-button">В корзину</button>
                            </div>
                        </div>
                    </article>
                </div>
            </section>
        </main>

        <!-- Семантический тег footer -->
        <footer class="footer">
        </footer>
    </div>
</body>
</html>
